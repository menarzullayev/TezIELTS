name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install frontend dependencies
        run: npm ci
      - name: Prettier
        run: npm run format:check
      - name: ESLint
        run: npm run lint
      - name: Vitest
        run: npm run test:unit
      - name: NPM audit
        run: npm audit --audit-level=high
